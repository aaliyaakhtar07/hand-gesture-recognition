<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gesture Recognition Demo</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      font-weight: 600;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    #webcam-container canvas {
      border-radius: 15px;
    }

    button {
      background: #ff7a18;
      background: linear-gradient(45deg, #ff7a18, #ffb347);
      border: none;
      padding: 12px 25px;
      border-radius: 30px;
      font-size: 16px;
      color: white;
      cursor: pointer;
      transition: 0.3s;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }

    button:hover {
      transform: scale(1.1);
    }

    .label {
      width: 250px;
      margin: 10px 0;
      text-align: left;
    }

    .bar {
      height: 10px;
      background: #00ffcc;
      border-radius: 10px;
      transition: width 0.3s ease;
    }

    .label-name {
      font-size: 14px;
      margin-bottom: 3px;
    }
  </style>
</head>

<body>
  <h1>🤖 Hand Gesture Recognition</h1>
  <p>Real-time hand gesture recognition using Teachable Machine</p>

  <div class="container">
    <button onclick="init()">📸Start Camera</button>
    <button onclick="webcam.stop()">Stop</button>

    <div class="card" id="webcam-container"></div>

    <div class="card" id="label-container"></div>
  </div>

  <!-- TensorFlow + Teachable Machine -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.3/dist/teachablemachine-image.min.js"></script>

  <script>
    const URL = "https://teachablemachine.withgoogle.com/models/V-6UtxN9_/";
    let model, webcam, labelContainer, maxPredictions;

    async function init() {
      const modelURL = URL + "model.json";
      const metadataURL = URL + "metadata.json";

      model = await tmImage.load(modelURL, metadataURL);
      maxPredictions = model.getTotalClasses();

      webcam = new tmImage.Webcam(300, 300, true);
      await webcam.setup();
      await webcam.play();
      window.requestAnimationFrame(loop);

      document.getElementById("webcam-container").innerHTML = "";
      document.getElementById("webcam-container").appendChild(webcam.canvas);

      labelContainer = document.getElementById("label-container");
      labelContainer.innerHTML = "";

      for (let i = 0; i < maxPredictions; i++) {
        const div = document.createElement("div");
        div.classList.add("label");

        div.innerHTML = `
          <div class="label-name">Class</div>
          <div class="bar" style="width: 0%"></div>
        `;

        labelContainer.appendChild(div);
      }
    }

    async function loop() {
      webcam.update();
      await predict();
      window.requestAnimationFrame(loop);
    }

    async function predict() {
      const prediction = await model.predict(webcam.canvas);

      for (let i = 0; i < maxPredictions; i++) {
        const prob = prediction[i].probability;
        const name = prediction[i].className;

        const labelDiv = labelContainer.childNodes[i];
        labelDiv.querySelector(".label-name").innerText = name + " (" + (prob * 100).toFixed(1) + "%)";
        labelDiv.querySelector(".bar").style.width = (prob * 100) + "%";
      }
    }
  </script>
</body>
</html>
